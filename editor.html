<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>MAPOSTER | Editor</title>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; }

</head>
<body class="bg-background text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl border-b border-slate-200/15 dark:border-slate-800/15 shadow-sm dark:shadow-none">
<div class="flex justify-between items-center h-16 px-8 w-full">
<div class="text-xl font-bold tracking-tighter text-slate-900 dark:text-slate-50">
                MAPOSTER
            </div>
<nav class="hidden md:flex items-center gap-8 font-inter tracking-tight">
<a class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" href="#">Gallery</a>
<a class="text-slate-900 dark:text-white font-semibold border-b-2 border-slate-900 dark:border-white pb-1" href="#">My Designs</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" href="#">Journal</a>
</nav>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-md transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">shopping_bag</span>
</button>
<button class="p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-md transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">account_circle</span>
</button>
</div>
</div>
</header>
<div class="flex pt-16 min-h-screen">
<!-- SideNavBar / Poster Editor -->
<aside class="fixed left-0 top-16 h-[calc(100vh-4rem)] w-80 z-40 bg-slate-50 dark:bg-slate-950 border-r border-slate-200/15 dark:border-slate-800/15 flex flex-col p-6 gap-y-8 overflow-y-auto">
<div class="space-y-1">
<h1 class="text-lg font-black tracking-tighter text-slate-900 dark:text-slate-50">Poster Editor</h1>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">Create your masterpiece</p>
</div>
<nav class="flex flex-col gap-2">
<div class="flex items-center gap-3 p-3 text-slate-900 dark:text-white bg-slate-200/50 dark:bg-slate-800/50 rounded-lg active:scale-[0.98] transition-transform font-inter text-sm font-medium">
<span class="material-symbols-outlined">search</span>
                    Location
                </div>
<div class="flex items-center gap-3 p-3 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg active:scale-[0.98] transition-all font-inter text-sm font-medium cursor-pointer">
<span class="material-symbols-outlined">palette</span>
                    Design
                </div>
<div class="flex items-center gap-3 p-3 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg active:scale-[0.98] transition-all font-inter text-sm font-medium cursor-pointer">
<span class="material-symbols-outlined">aspect_ratio</span>
                    Layout
                </div>
<div class="flex items-center gap-3 p-3 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg active:scale-[0.98] transition-all font-inter text-sm font-medium cursor-pointer">
<span class="material-symbols-outlined">layers</span>
                    Finish
                </div>
</nav>
<div class="space-y-6">
<!-- Location Search -->
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/60">Location Search</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-highest transition-all" placeholder="Search a city..." type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl">search</span>
</div>
</div>
<!-- Labels -->
<div class="space-y-4">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/60">Typography &amp; Details</label>
<div class="space-y-3">
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-highest transition-all" placeholder="Main Title" type="text" value="SAN FRANCISCO"/>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-highest transition-all" placeholder="Subtitle" type="text" value="CALIFORNIA"/>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-highest transition-all" placeholder="Coordinates" type="text" value="37.7749° N, 122.4194° W"/>
</div>
</div>
<!-- Theme Selector -->
<div class="space-y-3">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/60">Map Aesthetic</label>
<div class="grid grid-cols-3 gap-2">
<button class="aspect-square bg-slate-900 rounded-lg ring-2 ring-primary ring-offset-2 ring-offset-surface"></button>
<button class="aspect-square bg-[#f0ede4] rounded-lg hover:scale-105 transition-transform"></button>
<button class="aspect-square bg-[#1a3a3a] rounded-lg hover:scale-105 transition-transform"></button>
<button class="aspect-square bg-[#d9e2ec] rounded-lg hover:scale-105 transition-transform"></button>
<button class="aspect-square bg-[#242424] rounded-lg hover:scale-105 transition-transform"></button>
<button class="aspect-square bg-white border border-outline-variant/30 rounded-lg hover:scale-105 transition-transform"></button>
</div>
</div>
<!-- Layout & Size -->
<div class="space-y-3">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/60">Dimensions</label>
<div class="flex bg-surface-container-low p-1 rounded-xl">
<button class="flex-1 py-2 text-xs font-bold bg-surface-container-lowest rounded-lg shadow-sm">Portrait</button>
<button class="flex-1 py-2 text-xs font-bold text-on-surface-variant/60">Landscape</button>
</div>
<select class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/10 appearance-none">
<option>18 x 24 inches</option>
<option selected="">24 x 36 inches</option>
<option>50 x 70 cm</option>
</select>
</div>
</div>
<div class="mt-auto pt-6 border-t border-slate-200/10">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-xl shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">shopping_bag</span>
                    Add to Cart
                </button>
</div>
</aside>
<!-- Preview Canvas -->
<main class="ml-80 flex-1 bg-surface-container-low flex items-center justify-center p-12">
<div class="relative group">
<!-- Poster Shadow Glow -->
<div class="absolute -inset-4 bg-on-surface/5 blur-3xl rounded-[2rem] opacity-50"></div>
<!-- The Poster Frame -->
<div class="relative w-[500px] aspect-[2/3] bg-white p-12 shadow-2xl flex flex-col ring-1 ring-black/5">
<!-- Map Image Area -->
<div class="flex-1 relative overflow-hidden bg-slate-100 rounded-sm">
<img class="w-full h-full object-cover grayscale opacity-90 mix-blend-multiply" data-alt="Detailed minimalist street map of San Francisco" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVVjWmk7xnUQNdBj4YP4-xYy_ihPAHOrAieAv1BoJz-SeGpXyIu7N-Kuqat7r2pOkZx5Aj1FMS_cSTbEzz0Pylyeo8KO3dmkJLd2r4gNi1OEX0fCnq5PRb5_TBgGGkkKBccO1pPBheM0wqFNZR0ZRdAPSHb33PZCE9Djbr9NblDJVhM99s42Tu6hG5yXRJ2rC79M4t8sO5SxKpKnvFB2Uq6gTISnKfwrn-rUNvjLqPeHf3rhZYbxbqz4eUd_BO-iSUuPOt38DSfm2S"/>
<!-- Technical Overlay (Tech Chic) -->
<div class="absolute top-4 right-4 flex flex-col items-end">
<span class="text-[8px] font-mono uppercase tracking-tighter opacity-30">Render 04.2A</span>
<span class="text-[8px] font-mono uppercase tracking-tighter opacity-30">Projection: Mercator</span>
</div>
</div>
<!-- Poster Typography -->
<div class="mt-10 space-y-1 text-center">
<h2 class="text-4xl font-extrabold tracking-tighter text-slate-900">SAN FRANCISCO</h2>
<div class="flex items-center justify-center gap-4 py-2">
<div class="h-px w-8 bg-slate-200"></div>
<p class="text-[10px] tracking-[0.3em] font-medium text-slate-500 uppercase">California</p>
<div class="h-px w-8 bg-slate-200"></div>
</div>
<p class="text-[9px] font-mono tracking-widest text-slate-400">37.7749° N, 122.4194° W</p>
</div>
</div>
<!-- Floating Toolbar Tools -->
<div class="absolute -right-16 top-1/2 -translate-y-1/2 flex flex-col gap-4">
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md shadow-lg border border-white/20 flex items-center justify-center text-slate-700 hover:text-primary transition-colors">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md shadow-lg border border-white/20 flex items-center justify-center text-slate-700 hover:text-primary transition-colors">
<span class="material-symbols-outlined">fullscreen</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md shadow-lg border border-white/20 flex items-center justify-center text-slate-700 hover:text-primary transition-colors">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
</main>
</div>
<!-- Responsive Footer for Mobile (Hidden on Web) -->
<div class="md:hidden fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-200 flex justify-around items-center p-4 z-50">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">palette</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Design</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">aspect_ratio</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Size</span>
</button>
<button class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center -mt-8 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">map</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Place</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Cart</span>
</button>
</div>
</body></html>
